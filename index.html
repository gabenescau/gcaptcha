<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Verified - Acesso Liberado</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configurações de Design -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    },
                    colors: {
                        google: { green: '#34A853' }
                    },
                    animation: {
                        'pulse-custom': 'pulse-custom 2s infinite',
                        'bounce-subtle': 'bounce-subtle 3s infinite ease-in-out',
                        'fade-in-up': 'fadeInUp 0.6s ease-out',
                        'pop-in': 'popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                    },
                    keyframes: {
                        'pulse-custom': {
                            '0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(52, 168, 83, 0.7)' },
                            '50%': { transform: 'scale(1.02)', boxShadow: '0 0 0 10px rgba(52, 168, 83, 0)' },
                        },
                        'bounce-subtle': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-3px)' },
                        },
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(20px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Meta Pixel Code -->
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                    n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '934970242377343');
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=934970242377343&ev=PageView&noscript=1" /></noscript>
    <!-- End Meta Pixel Code -->

    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck
        data-utmify-prevent-subids async defer></script>



    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Roboto', sans-serif;
        }

        .hidden {
            display: none !important;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 0;
        }

        /* Animação do Gráfico via CSS puro */
        .path-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawGraph 2s ease-out forwards;
        }

        @keyframes drawGraph {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body
    class="min-h-screen font-sans text-gray-800 flex flex-col items-center py-6 px-4 relative overflow-x-hidden bg-gray-50">

    <!-- Fundo Teia -->
    <canvas id="particleCanvas" class="fixed inset-0 w-full h-full pointer-events-none z-0"
        style="background: linear-gradient(to bottom, #f0f4f8, #ffffff);"></canvas>

    <!-- Toast Prova Social -->
    <div id="socialToast"
        class="fixed top-3 right-3 z-50 transition-all duration-500 transform translate-x-full opacity-0 pointer-events-none">
        <div
            class="bg-white/95 backdrop-blur-md border-l-4 border-green-500 text-gray-800 px-4 py-3 rounded shadow-xl flex items-center gap-3 max-w-[240px]">
            <div class="bg-green-100 p-2 rounded-full shrink-0">
                <!-- Icon Wallet -->
                <svg class="w-4 h-4 text-green-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1" />
                    <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4" />
                </svg>
            </div>
            <div class="flex flex-col">
                <p id="toastName" class="text-[10px] font-bold text-gray-500 leading-none mb-0.5">Nome</p>
                <p id="toastAmount" class="text-xs font-extrabold text-green-600 leading-none">R$ 0,00</p>
            </div>
        </div>
    </div>

    <!-- Barra Progresso -->
    <div id="progressBarContainer" class="fixed top-0 left-0 w-full h-2 bg-gray-200 z-50 shadow-sm hidden">
        <div id="progressBar"
            class="h-full bg-gradient-to-r from-blue-600 to-green-500 transition-all duration-700 ease-out shadow-[0_0_15px_rgba(52,168,83,0.6)] relative overflow-hidden"
            style="width: 0%">
            <div class="absolute inset-0 bg-white/30 animate-pulse"></div>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" class="w-full max-w-md z-10 animate-fade-in-up relative"></div>

    <script>
        // --- Ícones (SVG Strings corrigidas para HTML) ---
        const icons = {
            // LOGO NOVO: G preto + Texto Captchas
            google: `
            <div class="flex items-center justify-center gap-2 select-none hover:scale-105 transition-transform duration-300 cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-12 h-12 shrink-0">
                    <path fill="#000000" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#000000" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#000000" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" />
                    <path fill="#000000" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                <span class="font-sans text-[2rem] font-medium text-black tracking-normal leading-none pt-1">Captchas</span>
            </div>
            `,
            badgeCheck: '<svg class="w-8 h-8 text-white" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.78 4.78 4 4 0 0 1-6.74 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.74Z"/><path d="m9 12 2 2 4-4"/></svg>',
            lock: '<svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
            shieldCheck: '<svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>',
            chevronRight: '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',
            check: '<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
            loader2: '<svg class="w-10 h-10 text-blue-600 animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
            sparkles: '<svg class="w-5 h-5 text-green-600 fill-green-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>',
            alertCircle: '<svg class="w-6 h-6 text-amber-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>',
            award: '<svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>',
            x: '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 18 18"/></svg>',
            clock: '<svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
        };

        // --- Variáveis ---
        window.currentStep = 0;
        window.moneyCount = 0;
        window.isLoading = false;
        window.loadingText = "";
        window.protocol = Math.floor(100000 + Math.random() * 900000);
        window.timeLeft = 600;

        // --- Render ---
        function render() {
            const container = document.getElementById('appContainer');
            const progressContainer = document.getElementById('progressBarContainer');
            const progressBar = document.getElementById('progressBar');

            if (window.currentStep > 0 && window.currentStep < 5) {
                progressContainer.classList.remove('hidden');
                setTimeout(() => progressBar.style.width = `${(window.currentStep / 5) * 100}%`, 50);
            } else {
                progressContainer.classList.add('hidden');
            }

            if (window.isLoading) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-6 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl border border-white max-w-sm mx-auto animate-fade-in">
                        <div class="relative mb-10">
                            <div class="absolute inset-0 bg-blue-100 rounded-full animate-ping opacity-75 delay-100"></div>
                            <div class="absolute inset-0 bg-green-100 rounded-full animate-ping opacity-75 delay-300"></div>
                            <div class="w-24 h-24 bg-white rounded-full shadow-xl flex items-center justify-center relative z-20 border-4 border-white">${icons.loader2}</div>
                            <div class="absolute -bottom-2 -right-2 bg-green-500 text-white p-2 rounded-full shadow-lg animate-bounce z-30">${icons.check}</div>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-800 mb-3 animate-pulse text-center">${window.loadingText}</h3>
                        <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden shadow-inner border border-gray-100">
                            <div class="h-full bg-gradient-to-r from-blue-500 via-green-400 to-green-500 animate-progress" style="width: 100%; transition: width 1.5s linear"></div>
                        </div>
                        <p class="mt-4 text-gray-400 text-sm font-medium">Não feche a página...</p>
                    </div>
                `;
                return;
            }

            // Step 0
            if (window.currentStep === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center bg-white/95 backdrop-blur-sm rounded-[2rem] shadow-2xl overflow-hidden border border-white relative group p-8 sm:p-10 animate-fade-in-up">
                        <div class="w-full flex justify-center mb-6">${icons.google}</div>
                        <div class="w-16 h-1.5 bg-[#1aa260] rounded-full mb-8"></div>
                        <h1 class="font-serif text-2xl font-bold text-gray-900 mb-4 text-center leading-tight">PARABÉNS! SEU ACESSO FOI LIBERADO</h1>
                        
                        <!-- TIMER DE ESCASSEZ NO INÍCIO -->
                        <div class="flex items-center justify-center gap-1.5 text-red-600 bg-red-50 border border-red-100 px-3 py-1 rounded-full text-[10px] font-bold mb-4 animate-pulse">
                            ${icons.clock} <span id="timerText">Vaga expira em 10:00</span>
                        </div>

                        <p class="text-gray-600 text-lg text-center mb-6 leading-relaxed">Você está a um passo de receber <span class="font-bold text-gray-900" id="moneySpan">R$ ${formatMoney(window.moneyCount)}</span> através da nossa nova ferramenta.</p>
                        <p class="text-gray-800 font-medium text-center mb-8">Responda este breve questionário para configurarmos sua conta de recebimento.</p>
                        
                        <div class="w-full flex flex-col items-center justify-center pb-8 px-2">
                            <div class="relative bg-white w-full max-w-[280px] rounded-2xl shadow-xl border border-gray-100 p-6 flex flex-col items-center text-center z-10 transform transition-transform hover:scale-105 duration-300">
                                <div class="absolute -top-6 bg-green-500 p-3 rounded-2xl shadow-lg shadow-green-200 animate-bounce-subtle ring-4 ring-white">${icons.badgeCheck}</div>
                                <div class="mt-6 space-y-1">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">STATUS DA CONTA</p>
                                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">APROVADO</h2>
                                </div>
                                <div class="flex items-center gap-1 text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded-md mt-1 mb-3 border border-gray-100">
                                    ${icons.lock} <span>Protocolo: #${window.protocol}-BR</span>
                                </div>
                                <div class="my-2 w-full bg-gray-50 rounded-xl p-3 border border-gray-100">
                                    <p class="text-xs text-gray-500 mb-1">Saldo Liberado</p>
                                    <p class="text-3xl font-bold text-green-600 tracking-tighter">R$ 1.835,78</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="handleNextStep('Iniciando configuração...')" class="w-full bg-[#1aa260] hover:bg-[#158f54] text-white font-bold py-5 rounded-full shadow-lg transform transition-all duration-300 text-sm tracking-widest uppercase flex items-center justify-center gap-2 group relative overflow-hidden animate-pulse-custom hover:scale-105 cursor-pointer">
                            <span class="relative z-10 flex items-center gap-2">CONFIGURAR MEU RECEBIMENTO ${icons.chevronRight}</span>
                            <div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:animate-shine"></div>
                        </button>
                        <div class="mt-6 flex flex-col items-center gap-2 text-gray-400 text-[10px]">
                            <div class="flex items-center gap-4 opacity-70">
                                <div class="flex items-center gap-1">${icons.shieldCheck} Site Seguro</div>
                                <div class="flex items-center gap-1">${icons.lock} Criptografia 256-bit</div>
                            </div>
                            <p>Google Verified Partner</p>
                        </div>
                    </div>
                `;
                if (window.moneyCount < 1835) animateMoney();
                startTimer(); // Inicia o timer imediatamente
            }
            // Steps 1-4
            else if (window.currentStep > 0 && window.currentStep < 5) {
                let inner = '';
                if (window.currentStep === 1) {
                    inner = `<div class="text-center mb-8"><div class="inline-block bg-green-50 border border-green-100 rounded-full px-4 py-1 text-green-700 text-sm font-bold mb-4 shadow-sm">Saldo Reservado: R$ 1.835,78</div><h2 class="font-serif text-2xl font-bold text-gray-900 leading-snug">Qual será sua prioridade ao receber esse dinheiro?</h2></div><div class="space-y-3">${renderOption('💳', 'Pagar dívidas e contas')}${renderOption('🛒', 'Fazer compras para casa')}${renderOption('📈', 'Investir ou guardar')}</div>`;
                } else if (window.currentStep === 2) {
                    inner = `<div class="w-16 h-16 bg-blue-50 border border-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600 shadow-sm rotate-3 hover:rotate-6 transition-transform">${icons.award}</div><h2 class="text-center font-serif text-2xl font-bold text-gray-900 mb-8 leading-snug">Você já trabalhou avaliando códigos ou digitando na internet antes?</h2><div class="space-y-3">${renderOption('👨‍💻', 'Sim, já tenho experiência')}${renderOption('🚀', 'Não, é minha primeira vez (Mas aprendo rápido).')}</div>`;
                } else if (window.currentStep === 3) {
                    inner = `<div class="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-100 rounded-xl p-4 mb-8 flex items-start gap-4 shadow-sm"><div class="bg-green-100 p-2 rounded-full shrink-0">${icons.sparkles}</div><div><h4 class="font-bold text-green-900 text-sm">Pagamento por Produção</h4><p class="text-sm text-green-800 leading-snug mt-1">A ferramenta Google Captcha paga instantaneamente após cada tarefa.</p></div></div><h2 class="text-center font-serif text-2xl font-bold text-gray-900 mb-8">Qual sua chave PIX preferida para receber?</h2><div class="space-y-3">${renderOption('📄', 'CPF / CNPJ')}${renderOption('📱', 'Celular / E-mail')}${renderOption('🔑', 'Chave Aleatória')}</div>`;
                } else if (window.currentStep === 4) {
                    inner = `
                        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 mb-8 shadow-sm relative overflow-hidden group hover:shadow-md transition-shadow">
                            <div class="flex gap-4 items-start relative z-10">
                                <div class="bg-amber-100 p-2 rounded-full animate-pulse">${icons.alertCircle}</div>
                                <div>
                                    <h4 class="font-bold text-amber-900 mb-1">Última Etapa</h4>
                                    <p class="text-sm text-amber-900/80 leading-relaxed">Devido à alta demanda, você precisa ativar seu cadastro nos próximos <span class="font-bold underline decoration-amber-400 decoration-2">10 minutos</span> após o vídeo.</p>
                                </div>
                            </div>
                        </div>
                        <h2 class="text-center font-serif text-3xl font-bold text-gray-900 mb-8">Você está pronto?</h2>
                        <button onclick="handleNextStep('Gerando seu acesso...')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white p-1 rounded-2xl shadow-[0_10px_40px_rgba(34,197,94,0.4)] mb-4 transform hover:-translate-y-1 transition-all duration-300 group cursor-pointer">
                            <div class="bg-transparent border-2 border-white/20 rounded-[14px] p-4 flex items-center justify-between h-full w-full">
                                <div class="flex items-center gap-4">
                                    <div class="bg-white text-green-600 p-2 rounded-lg shadow-sm">${icons.check}</div>
                                    <div class="text-left">
                                        <span class="block font-bold text-lg">SIM</span>
                                        <span class="text-sm text-green-100 opacity-90">Mostre-me como sacar</span>
                                    </div>
                                </div>
                                <div class="opacity-70 group-hover:translate-x-2 transition-transform">${icons.chevronRight}</div>
                            </div>
                        </button>
                        <button class="w-full text-gray-400 py-4 rounded-xl flex items-center justify-center gap-2 hover:text-red-500 transition-colors text-sm font-medium group cursor-pointer">
                            <div class="group-hover:scale-110 transition-transform">${icons.x}</div>
                            Não, deixa pra lá.
                        </button>`;
                }

                container.innerHTML = `
                    <div class="bg-white/95 backdrop-blur-sm rounded-[2rem] shadow-2xl border border-white p-6 sm:p-8 relative animate-fade-in-right">
                        <div class="flex justify-center mb-8">${icons.google}</div>
                        ${inner}
                    </div>
                `;
            }
            // Final Step (GRÁFICO CORRIGIDO - VERDE)
            else if (window.currentStep === 5) {
                container.innerHTML = `
                    <div class="bg-white/95 backdrop-blur-sm rounded-[2rem] shadow-2xl border border-white p-6 sm:p-8 animate-fade-in-up relative overflow-hidden text-center">
                        <div class="relative z-10">
                            <div class="flex justify-center mb-6">${icons.google}</div>
                            <div class="mb-6">
                                <div class="inline-flex items-center gap-2 bg-green-100 text-green-700 px-4 py-2 rounded-full font-bold text-sm mb-4 animate-bounce-subtle">
                                    ${icons.check} Configuração Realizada!
                                </div>
                                <h1 class="font-serif text-3xl font-bold text-gray-900 mb-2">Tudo Pronto!</h1>
                                <p class="text-gray-500 text-sm max-w-xs mx-auto">Seu perfil de recebimento foi salvo com sucesso em nosso sistema seguro.</p>
                            </div>
                            
                            <!-- Gráfico SVG (Cores Corrigidas: HTML/SVG Attributes) -->
                            <div class="bg-gradient-to-br from-gray-50 to-white p-4 rounded-3xl border border-gray-100 shadow-[inset_0_2px_10px_rgba(0,0,0,0.05)] mb-8 relative h-72 w-full select-none group overflow-hidden">
                                <div class="absolute inset-0 pointer-events-none">
                                    <div class="absolute bottom-12 left-0 right-0 h-[1px] bg-gray-200/80"></div>
                                    <div class="absolute bottom-32 left-0 right-0 h-[1px] bg-gray-200/50"></div>
                                    <div class="absolute bottom-52 left-0 right-0 h-[1px] bg-gray-200/50"></div>
                                </div>
                                <svg class="w-full h-full overflow-visible drop-shadow-sm relative z-10" viewBox="0 0 300 200" preserveAspectRatio="none">
                                    <defs>
                                        <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stop-color="#34A853" stop-opacity="0.2"/>
                                            <stop offset="100%" stop-color="#34A853" stop-opacity="0"/>
                                        </linearGradient>
                                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                        </filter>
                                    </defs>
                                    <!-- Outros (Cinza) -->
                                    <path d="M0,150 C80,145 150,155 300,140" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6,6" opacity="0.5" />
                                    <text x="250" y="130" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Outros</text>
                                    
                                    <!-- VOCÊ (Verde) -->
                                    <path d="M0,150 C100,145 180,50 300,20 V200 H0 Z" fill="url(#greenGrad)" />
                                    <path d="M0,150 C100,145 180,50 300,20" fill="none" stroke="#34A853" stroke-width="6" stroke-linecap="round" class="path-draw" style="filter: url(#glow);" />
                                    
                                    <g class="animate-pop-in" style="animation-delay: 1.5s; opacity: 0; animation-fill-mode: forwards;">
                                        <circle cx="300" cy="20" r="8" fill="#34A853" class="animate-ping" opacity="0.5" />
                                        <circle cx="300" cy="20" r="5" fill="#fff" stroke="#34A853" stroke-width="3" />
                                        <foreignObject x="180" y="0" width="120" height="60">
                                            <div class="bg-gradient-to-r from-green-500 to-emerald-600 text-white text-center rounded-lg shadow-lg py-1 px-2 border border-green-400 transform -translate-x-4">
                                                <div class="text-[10px] uppercase font-bold text-green-100 leading-none mb-0.5">Qualificado</div>
                                                <div class="text-sm font-extrabold leading-none">VOCÊ 🚀</div>
                                            </div>
                                            <div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-emerald-600 mx-auto transform translate-x-8"></div>
                                        </foreignObject>
                                    </g>
                                    
                                    <text x="10" y="185" fill="#94a3b8" font-size="10">Análise</text>
                                    <text x="150" y="185" text-anchor="middle" fill="#94a3b8" font-size="10">Verificação</text>
                                    <text x="290" y="185" text-anchor="end" fill="#15803d" font-size="10" font-weight="bold">APROVAÇÃO</text>
                                </svg>
                            </div>

                            <div class="flex items-center justify-center gap-1.5 text-red-600 bg-red-50 border border-red-100 px-3 py-1 rounded-full text-[10px] font-bold mb-4 animate-pulse">
                                ${icons.clock} <span id="timerText">Vaga expira em 10:00</span>
                            </div>
                            <p class="text-gray-800 font-bold text-sm bg-yellow-50 border border-yellow-100 py-3 px-4 rounded-xl mb-6">
                                Clique no botão abaixo para assistir ao vídeo e liberar seu saldo.
                            </p>
                            <button onclick="window.open('./c6/index.html', '_blank')" class="w-full bg-[#0f9d58] hover:bg-[#0b8046] text-white font-extrabold py-6 rounded-2xl shadow-[0_10px_40px_rgba(15,157,88,0.5)] transform hover:-translate-y-1 transition-all duration-300 uppercase tracking-widest text-base flex items-center justify-center gap-3 animate-bounce-custom relative overflow-hidden group cursor-pointer">
                                ${icons.lock} LIBERAR SALDO!
                                <div class="absolute inset-0 bg-white/30 skew-x-[-20deg] w-[20%] translate-x-[-200%] group-hover:animate-shine"></div>
                            </button>
                            <div class="mt-8 flex items-center justify-center text-gray-400 text-xs font-medium gap-2 opacity-70 hover:opacity-100 transition-opacity">
                                ${icons.shieldCheck} <span>Ambiente Criptografado de Ponta a Ponta</span>
                            </div>
                        </div>
                    </div>
                `;
                startTimer();
            }
        }

        // Helpers
        function handleNextStep(msg) {
            if (navigator.vibrate) navigator.vibrate(50);
            window.loadingText = msg;
            window.isLoading = true;
            render();
            setTimeout(() => {
                window.isLoading = false;
                window.currentStep++;
                render();
                window.scrollTo(0, 0);
            }, 1500);
        }

        window.renderOption = function (emoji, text) {
            return `<button onclick="handleNextStep('Salvando resposta...')" class="w-full relative overflow-hidden group p-5 mb-4 rounded-2xl border transition-all duration-300 ease-out flex items-center shadow-sm select-none bg-white border-gray-200 hover:border-green-400 hover:shadow-lg hover:-translate-y-1 cursor-pointer"><div class="w-12 h-12 rounded-2xl flex items-center justify-center mr-5 transition-all duration-500 shrink-0 text-2xl shadow-inner bg-gray-50 text-gray-400 group-hover:bg-green-100 group-hover:text-green-600 group-hover:scale-110"><span>${emoji}</span></div><span class="text-left font-semibold text-lg transition-colors leading-tight flex-1 text-gray-700">${text}</span><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-300 border-gray-300 scale-90 opacity-50"></div></button>`;
        }

        window.formatMoney = function (val) { return val.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        function animateMoney() {
            let start = 0; const end = 1835.78; const duration = 2000; const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                window.moneyCount = start + (end - start) * ease;
                const span = document.getElementById('moneySpan');
                if (span) span.innerText = `R$ ${formatMoney(window.moneyCount)}`;
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function startTimer() {
            // Limpa intervalo anterior se existir
            if (window.timerInterval) clearInterval(window.timerInterval);

            // Função de atualização do texto
            const updateTimerText = () => {
                const el = document.getElementById('timerText');
                if (!el) return;
                const m = Math.floor(window.timeLeft / 60);
                const s = window.timeLeft % 60;
                el.innerText = `Vaga expira em ${m}:${s < 10 ? '0' : ''}${s}`;
            };

            // Intervalo global
            window.timerInterval = setInterval(() => {
                if (window.timeLeft > 0) {
                    window.timeLeft--;
                    updateTimerText();
                } else clearInterval(window.timerInterval);
            }, 1000);

            // Atualização inicial imediata para não esperar 1s
            setTimeout(updateTimerText, 50);
        }

        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            const particles = Array.from({ length: 80 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, size: Math.random() * 2 + 1
            }));
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(150, 160, 180, 0.5)';
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1; if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = p.x - particles[j].x, dy = p.y - particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.beginPath(); ctx.strokeStyle = `rgba(180,190,210,${0.4 * (1 - dist / 150)})`;
                            ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function initToast() {
            const names = ["João M.", "Ana P.", "Carlos S.", "Mariana L.", "Roberto F.", "Fernanda C.", "Lucas R.", "Beatriz O."];
            const toast = document.getElementById('socialToast');
            const nameEl = document.getElementById('toastName');
            const amountEl = document.getElementById('toastAmount');
            const show = () => {
                const name = names[Math.floor(Math.random() * names.length)];
                const amount = (Math.random() * (2500 - 800) + 800).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                nameEl.innerText = `${name} sacou`;
                amountEl.innerText = amount;
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
                setTimeout(() => {
                    toast.classList.remove('translate-x-0', 'opacity-100');
                    toast.classList.add('translate-x-full', 'opacity-0');
                }, 4000);
            };
            setTimeout(show, 1500); setInterval(show, 8000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
            initParticles();
            initToast();
        });
    </script>
</body>
